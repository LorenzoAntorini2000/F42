<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F42 — Feed</title>
  <style>body { visibility: hidden; }</style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
/* ── F42 · Global & Landing · Soft Modern ── */

@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');

:root {
  --bg:           #F0F4FF;
  --bg-card:      #FFFFFF;
  --surface-1:    rgba(255,255,255,0.75);
  --surface-2:    rgba(255,255,255,0.42);

  --green:        #34C77B;
  --green-lt:     #E8FAF1;
  --green-dk:     #1A9E5A;
  --purple:       #7B6CF6;
  --purple-lt:    #F0EEFF;
  --purple-dk:    #5B4ED4;
  --pink:         #F472B6;
  --pink-lt:      #FFF0F7;

  --text-1:       #0F172A;
  --text-2:       #475569;
  --text-3:       #94A3B8;
  --border:       rgba(148,163,184,0.18);
  --border-md:    rgba(148,163,184,0.28);

  --radius-sm:    10px;
  --radius-md:    18px;
  --radius-lg:    28px;

  --font-display: 'Nunito', 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
  --font-body:    'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;

  --shadow-sm:  0 2px 8px rgba(15,23,42,0.06);
  --shadow-md:  0 8px 32px rgba(15,23,42,0.10);
  --shadow-lg:  0 24px 64px rgba(15,23,42,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font-body);
  font-weight: 400;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(ellipse 80% 55% at 5% 8%, rgba(123,108,246,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 55% 45% at 92% 15%, rgba(52,199,123,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 65% 55% at 50% 95%, rgba(244,114,182,0.10) 0%, transparent 60%),
    #F0F4FF;
  pointer-events: none;
}

/* ── Nav ── */
.nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.5rem; height: 64px;
  background: rgba(240,244,255,0.72);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: var(--font-display);
  font-size: 1.5rem; font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--green-dk) 0%, var(--purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.nav-links { display: flex; align-items: center; gap: 2rem; }
.nav-links a { color: var(--text-2); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: color 0.15s; }
.nav-links a:hover { color: var(--text-1); }

.nav-cta {
  background: var(--text-1) !important; color: #fff !important;
  padding: 0.5rem 1.15rem; border-radius: 99px;
  font-size: 0.84rem !important; font-weight: 600 !important;
  box-shadow: 0 2px 12px rgba(15,23,42,0.20);
  transition: transform 0.15s, box-shadow 0.15s !important;
}
.nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(15,23,42,0.28) !important; }

/* ── Hero ── */
.hero {
  text-align: center; padding: 7rem 1.5rem 5rem;
  max-width: 760px; margin: 0 auto; position: relative;
}

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-size: 0.75rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--green-dk); background: var(--green-lt);
  border: 1px solid rgba(52,199,123,0.28);
  padding: 0.35rem 1rem; border-radius: 99px; margin-bottom: 2rem;
}
.hero-eyebrow::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); display: inline-block;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(3rem, 8vw, 5.4rem); font-weight: 800;
  line-height: 1.05; letter-spacing: -0.03em;
  color: var(--text-1); margin-bottom: 1.5rem;
}
.hero-title .g {
  background: linear-gradient(135deg, var(--green) 0%, var(--purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.hero-subtitle {
  font-size: 1.1rem; color: var(--text-2); line-height: 1.75;
  margin-bottom: 2.5rem; font-weight: 400;
}

.hero-actions { display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 2.5rem; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 0.45rem;
  padding: 0.72rem 1.5rem; border-radius: 99px;
  font-family: var(--font-body); font-size: 0.9rem; font-weight: 600;
  text-decoration: none; cursor: pointer; border: none;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
}
.btn:active { transform: scale(0.97) !important; }

.btn-primary {
  background: linear-gradient(135deg, var(--green) 0%, var(--green-dk) 100%);
  color: #fff; box-shadow: 0 6px 24px rgba(52,199,123,0.30);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(52,199,123,0.40); }

.btn-ghost {
  background: var(--surface-1); color: var(--text-2);
  border: 1px solid var(--border-md); backdrop-filter: blur(8px);
}
.btn-ghost:hover { background: var(--bg-card); color: var(--text-1); transform: translateY(-1px); box-shadow: var(--shadow-sm); }

/* ── Pills ── */
.hero-pill-row { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
.pill {
  font-size: 0.76rem; font-weight: 500; color: var(--text-2);
  border: 1px solid var(--border-md); border-radius: 99px;
  padding: 0.3rem 0.85rem; background: var(--surface-1); backdrop-filter: blur(8px);
}

/* ── Features ── */
.features { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

.features-grid {
  display: grid;
  grid-template-columns: 1.55fr 1fr;
  grid-template-rows: auto auto;
  gap: 1.25rem;
}

.feature-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2rem 2rem 1.75rem;
  display: flex; flex-direction: column; gap: 0.75rem;
  backdrop-filter: blur(16px) saturate(1.2);
  -webkit-backdrop-filter: blur(16px) saturate(1.2);
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s, box-shadow 0.22s;
}
.feature-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.feature-card--large { grid-row: span 2; }

.feature-card--large  { background: linear-gradient(150deg, rgba(255,255,255,0.90) 0%, rgba(232,250,241,0.65) 100%); border-color: rgba(52,199,123,0.12); }
.feature-card:nth-child(2) { background: linear-gradient(150deg, rgba(255,255,255,0.90) 0%, rgba(240,238,255,0.65) 100%); border-color: rgba(123,108,246,0.12); }
.feature-card:nth-child(3) { background: linear-gradient(150deg, rgba(255,255,255,0.90) 0%, rgba(255,240,247,0.65) 100%); border-color: rgba(244,114,182,0.12); }

.feature-tag {
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
}
.feature-card--large .feature-tag  { color: var(--green-dk); }
.feature-card:nth-child(2) .feature-tag { color: var(--purple-dk); }
.feature-card:nth-child(3) .feature-tag { color: #be185d; }

.feature-title {
  font-family: var(--font-display);
  font-size: 1.85rem; font-weight: 700;
  line-height: 1.1; letter-spacing: -0.02em; color: var(--text-1);
}

.feature-body { font-size: 0.875rem; color: var(--text-2); line-height: 1.7; }

/* ── Feed mock ── */
.feature-mock { margin-top: auto; }

.feed-mock {
  display: flex; flex-direction: column; gap: 0.5rem;
  background: rgba(240,244,255,0.55);
  border-radius: var(--radius-md); padding: 0.875rem;
  border: 1px solid var(--border);
}

.mock-entry {
  display: flex; align-items: center; gap: 0.75rem;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 0.6rem 0.875rem;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s;
}
.mock-entry:hover { transform: translateX(3px); }
.mock-entry--dim { opacity: 0.42; }

.mock-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.66rem; font-weight: 700; flex-shrink: 0;
}
.mock-avatar--a { background: linear-gradient(135deg, #bbf7d0, #86efac); color: #166534; }
.mock-avatar--b { background: linear-gradient(135deg, #ddd6fe, #c4b5fd); color: #4c1d95; }

.mock-info { flex: 1; min-width: 0; }
.mock-name  { font-size: 0.77rem; font-weight: 600; color: var(--text-1); }
.mock-detail{ font-size: 0.68rem; color: var(--text-3); }
.mock-reaction { font-size: 1.05rem; flex-shrink: 0; }

/* ── Sync mock ── */
.sync-mock {
  background: rgba(240,238,255,0.50); border-radius: var(--radius-md);
  padding: 1rem; border: 1px solid rgba(123,108,246,0.14);
}

.sync-row { display: flex; gap: 0.3rem; justify-content: center; margin-bottom: 0.75rem; }

.sync-day {
  width: 30px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.66rem; font-weight: 600; color: var(--text-3);
  background: rgba(255,255,255,0.75); border: 1px solid var(--border);
  transition: transform 0.15s;
}
.sync-day.active {
  background: linear-gradient(135deg, var(--purple), var(--purple-dk));
  color: #fff; border-color: transparent;
  box-shadow: 0 4px 12px rgba(123,108,246,0.35);
  transform: translateY(-2px);
}

.sync-legend { font-size: 0.68rem; color: var(--text-3); text-align: center; font-weight: 500; }

.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; vertical-align: middle; margin-right: 2px; }
.dot--a { background: var(--green); }
.dot--b { background: var(--purple); }

/* ── Score mock ── */
.score-mock {
  background: linear-gradient(135deg, rgba(255,240,247,0.65), rgba(240,238,255,0.55));
  border-radius: var(--radius-md); padding: 1.25rem 1rem;
  border: 1px solid rgba(244,114,182,0.14);
  display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
}

.score-ring {
  position: relative; display: flex; align-items: center; justify-content: center;
  filter: drop-shadow(0 4px 16px rgba(123,108,246,0.22));
}
.score-label {
  position: absolute;
  font-family: var(--font-display); font-size: 1.6rem; font-weight: 800;
  background: linear-gradient(135deg, var(--green-dk), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.score-sub { font-size: 0.7rem; color: var(--text-3); font-weight: 500; }

/* ── How it works ── */
.how {
  padding: 6rem 1.5rem; text-align: center;
  position: relative; overflow: hidden;
}
.how::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(160deg, #0F172A 0%, #1E1B4B 100%); z-index: 0;
}
.how::after {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 55% at 15% 55%, rgba(52,199,123,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 30%, rgba(123,108,246,0.16) 0%, transparent 60%);
  z-index: 0;
}
.how > * { position: relative; z-index: 1; }

.how-title {
  font-family: var(--font-display);
  font-size: 2.4rem; font-weight: 800; letter-spacing: -0.02em;
  margin-bottom: 0.6rem; color: #fff;
}
.how-subtitle { font-size: 1rem; color: rgba(255,255,255,0.45); margin-bottom: 3.5rem; }

.how-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; max-width: 920px; margin: 0 auto; }

.how-step {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-md); padding: 2rem 1.5rem;
  backdrop-filter: blur(12px); transition: background 0.2s, transform 0.2s;
}
.how-step:hover { background: rgba(255,255,255,0.10); transform: translateY(-4px); }

.step-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; margin: 0 auto 1rem;
}
.step-icon--1 { background: rgba(52,199,123,0.18); }
.step-icon--2 { background: rgba(123,108,246,0.18); }
.step-icon--3 { background: rgba(244,114,182,0.18); }

.step-num {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; margin-bottom: 0.5rem;
}
.how-step:nth-child(1) .step-num { color: #6ee7a8; }
.how-step:nth-child(2) .step-num { color: #a5b4fc; }
.how-step:nth-child(3) .step-num { color: #f9a8d4; }

.step-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; color: #fff; }
.step-body  { font-size: 0.84rem; color: rgba(255,255,255,0.48); line-height: 1.65; }

/* ── Footer ── */
.footer {
  text-align: center; padding: 3rem 1.5rem; border-top: 1px solid var(--border);
}
.footer-logo {
  font-family: var(--font-display); font-size: 1.7rem; font-weight: 800;
  margin-bottom: 0.5rem; display: inline-block;
  background: linear-gradient(135deg, var(--green-dk), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.footer-tagline { font-size: 0.84rem; color: var(--text-3); margin-bottom: 0.75rem; }
.footer-links a { color: var(--text-2); font-size: 0.84rem; text-decoration: none; font-weight: 500; }
.footer-links a:hover { color: var(--text-1); }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hero > * { animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both; }
.hero-eyebrow  { animation-delay: 0.05s; }
.hero-title    { animation-delay: 0.12s; }
.hero-subtitle { animation-delay: 0.20s; }
.hero-actions  { animation-delay: 0.27s; }
.hero-pill-row { animation-delay: 0.34s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.feature-card { animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both; }
.feature-card:nth-child(1) { animation-delay: 0.10s; }
.feature-card:nth-child(2) { animation-delay: 0.20s; }
.feature-card:nth-child(3) { animation-delay: 0.28s; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .nav { padding: 0 1.25rem; }
  .nav-links a:not(.nav-cta) { display: none; }
  .features-grid { grid-template-columns: 1fr; }
  .feature-card--large { grid-row: span 1; }
  .how-steps { grid-template-columns: 1fr; gap: 1rem; }
  .hero { padding: 4.5rem 1.25rem 3rem; }
}
/* ── F42 · App Shell · Soft Modern ── */

@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');

.app-body { background: var(--bg); min-height: 100vh; }

.app-shell { display: grid; grid-template-columns: 232px 1fr; min-height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(20px) saturate(1.3);
  -webkit-backdrop-filter: blur(20px) saturate(1.3);
  border-right: 1px solid var(--border);
  padding: 1.5rem 1rem;
  display: flex; flex-direction: column; gap: 1.5rem;
  position: sticky; top: 0; height: 100vh;
}

.sidebar-logo {
  font-family: var(--font-display); font-size: 1.35rem; font-weight: 800;
  padding: 0 0.5rem; letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--green-dk), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* Couple card */
.couple-card {
  background: linear-gradient(135deg, rgba(232,250,241,0.7) 0%, rgba(240,238,255,0.7) 100%);
  border: 1px solid rgba(123,108,246,0.12);
  border-radius: var(--radius-md); padding: 0.875rem;
  display: flex; align-items: center; gap: 0.875rem;
}

.couple-avatars { display: flex; }

.c-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 700;
  border: 2.5px solid rgba(255,255,255,0.90);
  box-shadow: 0 2px 8px rgba(0,0,0,0.10);
}
.c-avatar--a {
  background: linear-gradient(135deg, #bbf7d0, #86efac); color: #166534;
  margin-right: -9px; z-index: 1;
}
.c-avatar--b { background: linear-gradient(135deg, #ddd6fe, #c4b5fd); color: #4c1d95; }

.couple-score-wrap { flex: 1; }
.couple-score-label { font-size: 0.65rem; color: var(--text-3); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
.couple-score-val {
  font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; line-height: 1.1;
  background: linear-gradient(135deg, var(--green-dk), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* App nav */
.app-nav { display: flex; flex-direction: column; gap: 0.2rem; }

.app-nav-item {
  display: flex; align-items: center; gap: 0.625rem;
  padding: 0.575rem 0.875rem; border-radius: var(--radius-sm);
  font-size: 0.875rem; font-weight: 500; color: var(--text-2);
  text-decoration: none; transition: background 0.12s, color 0.12s;
}
.app-nav-item:hover { background: rgba(255,255,255,0.6); color: var(--text-1); }
.app-nav-item.active {
  background: linear-gradient(135deg, rgba(232,250,241,0.8), rgba(240,238,255,0.8));
  color: var(--green-dk);
  box-shadow: inset 0 0 0 1px rgba(52,199,123,0.15);
}

.sidebar-back {
  margin-top: auto; font-size: 0.78rem; color: var(--text-3);
  text-decoration: none; padding: 0 0.5rem; transition: color 0.12s; font-weight: 500;
}
.sidebar-back:hover { color: var(--text-1); }

/* ── Main ── */
.app-main {
  padding: 2rem 2.5rem;
  max-width: 780px;
  display: flex; flex-direction: column; gap: 1.5rem;
}

.app-topbar { display: flex; align-items: center; justify-content: space-between; }

.app-page-title {
  font-family: var(--font-display); font-size: 1.75rem; font-weight: 800;
  letter-spacing: -0.02em; color: var(--text-1);
}

.topbar-date { font-size: 0.82rem; color: var(--text-3); font-weight: 500; }

/* ── Daily summary ── */
.daily-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }

.summary-card {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 1rem 1.125rem;
  backdrop-filter: blur(12px);
  box-shadow: var(--shadow-sm);
}

.summary-label { font-size: 0.72rem; color: var(--text-3); margin-bottom: 0.5rem; font-weight: 600; letter-spacing: 0.03em; }

.summary-bar-wrap {
  height: 5px; background: rgba(148,163,184,0.18);
  border-radius: 99px; margin-bottom: 0.45rem; overflow: hidden;
}
.summary-bar {
  height: 100%; border-radius: 99px;
  transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
}
.summary-bar--a { background: linear-gradient(90deg, var(--green), var(--green-dk)); }
.summary-bar--b { background: linear-gradient(90deg, var(--purple), var(--purple-dk)); }

.summary-val { font-size: 0.74rem; color: var(--text-2); font-feature-settings: 'tnum'; font-weight: 500; }

/* ── Feed ── */
.feed { display: flex; flex-direction: column; gap: 0.875rem; }

.feed-entry {
  display: flex; gap: 0.875rem;
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 1.125rem;
  backdrop-filter: blur(12px);
  box-shadow: var(--shadow-sm);
  transition: transform 0.2s, box-shadow 0.2s;
  animation: entryIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
}
.feed-entry:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

@keyframes entryIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.entry-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.10);
}
.entry-avatar--a { background: linear-gradient(135deg, #bbf7d0, #86efac); color: #166534; }
.entry-avatar--b { background: linear-gradient(135deg, #ddd6fe, #c4b5fd); color: #4c1d95; }

.entry-body { flex: 1; min-width: 0; }

.entry-header {
  display: flex; align-items: baseline; gap: 0.4rem;
  margin-bottom: 0.5rem; flex-wrap: wrap;
}
.entry-who  { font-size: 0.875rem; font-weight: 700; color: var(--text-1); }
.entry-type { font-size: 0.8rem; color: var(--text-3); font-weight: 400; }
.entry-time { font-size: 0.72rem; color: var(--text-3); margin-left: auto; font-weight: 500; }

.entry-content { margin-bottom: 0.75rem; }
.entry-meal-name { font-size: 0.925rem; color: var(--text-1); margin-bottom: 0.3rem; font-weight: 500; }

.entry-macros { display: flex; gap: 0.6rem; flex-wrap: wrap; }
.entry-macros span {
  font-size: 0.72rem; color: var(--text-3); font-weight: 500;
  background: rgba(148,163,184,0.12); border-radius: 99px;
  padding: 0.15rem 0.5rem; border: 1px solid var(--border);
}

/* Workout stats */
.entry-workout-stats { display: flex; gap: 1.5rem; margin-top: 0.4rem; }
.wstat { text-align: left; }
.wstat-val { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; color: var(--text-1); }
.wstat-lbl { font-size: 0.68rem; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

/* Reactions */
.entry-reactions { display: flex; gap: 0.375rem; align-items: center; flex-wrap: wrap; }

.react-btn {
  display: flex; align-items: center; gap: 0.3rem;
  padding: 0.25rem 0.65rem; border-radius: 99px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.6);
  font-size: 0.76rem; font-weight: 600; color: var(--text-2);
  cursor: pointer; transition: background 0.12s, border-color 0.12s, transform 0.1s;
  font-family: var(--font-body);
  backdrop-filter: blur(6px);
}
.react-btn:hover { background: var(--bg-card); border-color: var(--border-md); transform: scale(1.05); }
.react-btn:active { transform: scale(0.95); }
.react-btn.reacted {
  background: linear-gradient(135deg, rgba(232,250,241,0.9), rgba(240,238,255,0.9));
  border-color: rgba(52,199,123,0.3); color: var(--green-dk);
}

.react-btn--add {
  width: 28px; padding: 0.25rem; justify-content: center;
  color: var(--text-3); font-size: 0.9rem;
}

/* ── Log bar ── */
.log-bar { display: flex; gap: 0.875rem; padding-bottom: 2rem; }

.log-btn {
  flex: 1; padding: 0.75rem 1rem; border-radius: 99px;
  font-family: var(--font-body); font-size: 0.875rem; font-weight: 600;
  cursor: pointer; border: none; transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
}
.log-btn:active { transform: scale(0.97); }

.log-btn--meal {
  background: linear-gradient(135deg, var(--green), var(--green-dk));
  color: #fff; box-shadow: 0 4px 18px rgba(52,199,123,0.28);
}
.log-btn--meal:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(52,199,123,0.38); }

.log-btn--workout {
  background: linear-gradient(135deg, var(--purple), var(--purple-dk));
  color: #fff; box-shadow: 0 4px 18px rgba(123,108,246,0.26);
}
.log-btn--workout:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(123,108,246,0.36); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,23,42,0.40); z-index: 200;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: rgba(255,255,255,0.95); border-radius: var(--radius-lg);
  width: min(480px, 92vw); max-height: 90vh; overflow-y: auto;
  border: 1px solid var(--border-md);
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(24px);
  animation: modalIn 0.25s cubic-bezier(0.22,1,0.36,1);
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
}
.modal-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; }

.modal-close {
  background: rgba(148,163,184,0.12); border: none; border-radius: 50%;
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; color: var(--text-3); cursor: pointer; transition: background 0.12s, color 0.12s;
}
.modal-close:hover { background: rgba(148,163,184,0.22); color: var(--text-1); }

.modal-body { padding: 1.5rem; }

.form-group { margin-bottom: 1.25rem; }
.form-label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-2); margin-bottom: 0.4rem; letter-spacing: 0.02em; }

.form-input {
  width: 100%; padding: 0.65rem 0.9rem;
  border: 1.5px solid var(--border-md); border-radius: var(--radius-sm);
  background: rgba(248,250,252,0.8);
  font-family: var(--font-body); font-size: 0.9rem; color: var(--text-1);
  transition: border-color 0.15s, box-shadow 0.15s; outline: none;
}
.form-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(52,199,123,0.14);
  background: #fff;
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

.form-submit {
  width: 100%; padding: 0.75rem;
  background: linear-gradient(135deg, var(--green), var(--green-dk));
  color: #fff; border: none; border-radius: 99px;
  font-family: var(--font-body); font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; margin-top: 0.5rem;
  box-shadow: 0 4px 18px rgba(52,199,123,0.28);
}
.form-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(52,199,123,0.38); }
.form-submit:active { transform: scale(0.97); }

/* ── Placeholder pages ── */
.placeholder-section { text-align: center; padding: 5rem 2rem; max-width: 400px; margin: 0 auto; }
.placeholder-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.placeholder-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
.placeholder-body { font-size: 0.9rem; color: var(--text-2); line-height: 1.65; }

/* ── Empty / loading states ── */
.feed-empty {
  text-align: center; padding: 3.5rem 1.5rem;
}
.feed-empty-icon { font-size: 2rem; margin-bottom: 0.75rem; }
.feed-empty-title {
  font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; margin-bottom: 0.4rem;
}
.feed-empty-body { font-size: 0.875rem; color: var(--text-2); line-height: 1.65; }
.feed-loading {
  text-align: center; padding: 3rem; color: var(--text-3);
  font-size: 0.875rem; font-weight: 500;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar {
    position: static; height: auto;
    flex-direction: row; flex-wrap: wrap; padding: 0.75rem 1rem; gap: 0.75rem;
  }
  .sidebar-back { display: none; }
  .app-nav { flex-direction: row; }
  .app-main { padding: 1.25rem 1rem; }
  .daily-summary { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}
  </style>
</head>
<body class="app-body">

  <div class="app-shell">

    <aside class="sidebar">
      <div class="sidebar-logo">F42</div>
      <div class="couple-card">
        <div class="couple-avatars">
          <div class="c-avatar c-avatar--a" id="sidebar-avatar-me">··</div>
          <div class="c-avatar c-avatar--b" id="sidebar-avatar-partner">··</div>
        </div>
        <div class="couple-score-wrap">
          <div class="couple-score-label">Couple score</div>
          <div class="couple-score-val" id="sidebar-score">—</div>
        </div>
      </div>
      <nav class="app-nav">
        <a href="feed.html" class="app-nav-item active">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
          Feed
        </a>
        <a href="workouts.html" class="app-nav-item">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8h2m10 0h2M3 8l1-3h8l1 3M3 8l1 3h8l1-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Workouts
        </a>
        <a href="goals.html" class="app-nav-item">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="1" fill="currentColor"/></svg>
          Goals
        </a>
      </nav>
      <div style="margin-top:auto;display:flex;flex-direction:column;gap:0.35rem;padding:0 0.5rem;">
        <a href="index.html" class="sidebar-back" style="margin-top:0;">← Home</a>
        <button id="btn-signout" class="sidebar-back" style="background:none;border:none;cursor:pointer;text-align:left;color:var(--text-3);padding:0;font-size:0.78rem;font-weight:500;transition:color 0.12s;" onmouseenter="this.style.color='#dc2626'" onmouseleave="this.style.color='var(--text-3)'">Sign out</button>
      </div>
    </aside>

    <main class="app-main">
      <div class="app-topbar">
        <h1 class="app-page-title">Today's feed</h1>
        <div class="topbar-date" id="today-date"></div>
      </div>

      <div class="daily-summary">
        <div class="summary-card">
          <div class="summary-label" id="summary-label-me">— · calories</div>
          <div class="summary-bar-wrap"><div class="summary-bar summary-bar--a" id="summary-bar-me" style="width:0%"></div></div>
          <div class="summary-val" id="summary-val-me">0 / 2 000 kcal</div>
        </div>
        <div class="summary-card">
          <div class="summary-label" id="summary-label-partner">— · calories</div>
          <div class="summary-bar-wrap"><div class="summary-bar summary-bar--b" id="summary-bar-partner" style="width:0%"></div></div>
          <div class="summary-val" id="summary-val-partner">0 / 2 000 kcal</div>
        </div>
      </div>

      <div class="feed" id="feed">
        <div class="feed-loading">Loading feed…</div>
      </div>

      <div class="log-bar">
        <button class="log-btn log-btn--meal" onclick="openLogModal('meal')">+ Log meal</button>
        <button class="log-btn log-btn--workout" onclick="openLogModal('workout')">+ Log workout</button>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Log meal</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="main.js"></script>
  <script src="feed.js"></script>
  <script type="module">
    import { supabase } from './supabase-client.js';
    import { guardSession, populateSidebar } from './auth.js';

    const DAILY_KCAL_GOAL    = 2000;
    const WEEKLY_ENTRIES_MAX = 14;

    /* ── feed ── */
    async function loadFeed() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '<div class="feed-loading">Loading feed…</div>';

      const { data: entries, error } = await supabase
        .from('feed_entries')
        .select(`
          id, user_id, entry_type, title,
          kcal, protein_g, carbs_g, fat_g,
          duration_min, distance_km, logged_at,
          profile:profiles(display_name, initials)
        `)
        .eq('couple_id', profile.couple_id)
        .order('logged_at', { ascending: false })
        .limit(50);

      feed.innerHTML = '';

      if (error || !entries?.length) {
        feed.innerHTML = `
          <div class="feed-empty">
            <div class="feed-empty-icon">🥗</div>
            <div class="feed-empty-title">Nothing here yet</div>
            <p class="feed-empty-body">Log your first meal or workout to start your shared feed.</p>
          </div>`;
        return;
      }

      entries.forEach((row, i) => {
        const el = buildEntryFromRow(row, profile.id);
        el.style.animationDelay = `${i * 60}ms`;
        feed.appendChild(el);
      });
    }

    /* ── daily summary bars ── */
    async function loadSummary() {
      const now   = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
      const end   = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).toISOString();

      const { data: entries } = await supabase
        .from('feed_entries')
        .select('user_id, kcal')
        .eq('couple_id', profile.couple_id)
        .eq('entry_type', 'meal')
        .gte('logged_at', start)
        .lt('logged_at', end);

      const sum = (uid) =>
        (entries || []).filter(e => e.user_id === uid).reduce((s, e) => s + (e.kcal || 0), 0);

      const myKcal      = sum(profile.id);
      const partnerKcal = partner ? sum(partner.id) : 0;
      const pct         = (v) => `${Math.min(100, Math.round((v / DAILY_KCAL_GOAL) * 100))}%`;

      document.getElementById('summary-label-me').textContent      = `${profile.display_name} · calories`;
      document.getElementById('summary-bar-me').style.width        = pct(myKcal);
      document.getElementById('summary-val-me').textContent        = `${myKcal.toLocaleString()} / ${DAILY_KCAL_GOAL.toLocaleString()} kcal`;

      const partnerName = partner?.display_name ?? 'Partner';
      document.getElementById('summary-label-partner').textContent = `${partnerName} · calories`;
      document.getElementById('summary-bar-partner').style.width   = pct(partnerKcal);
      document.getElementById('summary-val-partner').textContent   = `${partnerKcal.toLocaleString()} / ${DAILY_KCAL_GOAL.toLocaleString()} kcal`;
    }

    /* ── couple score (last 7 days) ── */
    async function updateCoupleScore() {
      const since = new Date();
      since.setDate(since.getDate() - 7);

      const { count } = await supabase
        .from('feed_entries')
        .select('id', { count: 'exact', head: true })
        .eq('couple_id', profile.couple_id)
        .gte('logged_at', since.toISOString());

      const score = Math.min(100, Math.round(((count || 0) / WEEKLY_ENTRIES_MAX) * 100));
      const el    = document.getElementById('sidebar-score');
      if (el) el.textContent = score;
    }

    /* ── init ── */
    const profile = await guardSession();
    if (!profile) return;

    if (!profile.couple_id) {
      window.location.replace('pair.html');
      return;
    }

    // Fetch partner (may be null if they haven't joined yet)
    const { data: partnerRow } = await supabase
      .from('profiles')
      .select('id, display_name, initials')
      .eq('couple_id', profile.couple_id)
      .neq('id', profile.id)
      .maybeSingle();
    const partner = partnerRow;

    // Expose to feed.js (classic script, needs these via global)
    window.__f42 = {
      supabase,
      profile,
      partner,
      reloadFeed:    loadFeed,
      reloadSummary: loadSummary,
    };

    await Promise.all([
      populateSidebar(profile),
      loadFeed(),
      loadSummary(),
      updateCoupleScore(),
    ]);

    document.body.style.visibility = 'visible';
  </script>
</body>
